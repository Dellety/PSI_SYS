services:
  mysql:
    image: mysql:8.0
    container_name: psi_sys_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: psi_sys
      MYSQL_USER: psi_sys
      MYSQL_PASSWORD: psi_sys_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: psi_sys_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: psi_sys
      DB_PASSWORD: psi_sys_password
      DB_NAME: psi_sys
    depends_on:
      - mysql
    volumes:
      - uploads_data:/app/uploads

volumes:
  mysql_data:
  uploads_data:
